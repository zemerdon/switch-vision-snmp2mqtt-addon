name: Build Cisco Vision Add-on

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./cisco-vision-snmp2mqtt
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/zemerdon/cisco-vision-snmp2mqtt-addon:${{ matrix.arch }}-0.5.0-alpha1
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:latest
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=0.5.0-alpha1
            BUILD_NAME=Cisco Vision SNMP2MQTT
            BUILD_DESCRIPTION=Cisco Vision SNMP to MQTT bridge for Home Assistant
            BUILD_REPOSITORY=zemerdon/cisco-vision-snmp2mqtt-addon
            BUILD_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
