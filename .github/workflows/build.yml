name: Build Switch Vision Add-on

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./switch-vision-snmp2mqtt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/zemerdon/switch-vision-snmp2mqtt-addon:0.9.3
            ghcr.io/zemerdon/switch-vision-snmp2mqtt-addon:latest
          build-args: |
            BUILD_VERSION=0.9.3
            BUILD_NAME=Switch Vision SNMP2MQTT
            BUILD_DESCRIPTION=Switch Vision SNMP to MQTT bridge for Home Assistant
            BUILD_REPOSITORY=zemerdon/switch-vision-snmp2mqtt-addon
            BUILD_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
