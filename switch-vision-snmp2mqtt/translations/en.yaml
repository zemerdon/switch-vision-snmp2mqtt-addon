configuration:
  log:
    name: Log Level
    description: debug, info, warning or error (default - info)

  mqtt:
    name: MQTT Broker
    description: MQTT Broker connection settings

  targets_path:
    name: Config file with SNMP Targets
    description: Full path for the normal SNMP2MQTT targets config file

  use_switch_vision_generated_yaml:
    name: Use Switch Vision generated YAML
    description: Import and run the review-only YAML generated by Switch Vision Discovery

  switch_vision_generated_yaml_path:
    name: Switch Vision generated YAML path
    description: Full path to the generated-snmp2mqtt.yaml file from Switch Vision Discovery

  imported_targets_path:
    name: Imported targets path
    description: Internal path where validated Switch Vision generated YAML is copied before SNMP2MQTT starts

  backup_existing_config:
    name: Backup existing targets config
    description: Create a timestamped backup of the existing targets config before importing generated YAML

  homeassistant:
    name: Home Assistant
    description: Discovery settings for Home Assistant
