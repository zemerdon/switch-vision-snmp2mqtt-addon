---
name: Switch Vision SNMP2MQTT
version: 0.9.3
slug: switch_vision_snmp2mqtt
description: Switch Vision SNMP to MQTT bridge with Discovery generated YAML import support
url: https://github.com/zemerdon/switch-vision-snmp2mqtt

arch:
  - amd64
  - aarch64

image: ghcr.io/zemerdon/switch-vision-snmp2mqtt-addon

startup: application
boot: auto
init: false

map:
  - addons:rw
  - all_addon_configs:rw
  - config:rw
  - share:rw
  - ssl:rw

services:
  - mqtt:need

homeassistant: 2026.7.1

panel_icon: mdi:cog-transfer-outline
panel_title: Switch Vision SNMP2MQTT

options:
  mqtt:
    host: "localhost"
    port: 1883

  targets_path: "/config/addons_config/switch_vision_snmp2mqtt/targets.yaml"

  use_switch_vision_generated_yaml: false
  switch_vision_generated_yaml_path: "/share/switch_vision/generated-snmp2mqtt.yaml"
  imported_targets_path: "/config/addons_config/switch_vision_snmp2mqtt/imported/generated-snmp2mqtt.yaml"
  backup_existing_config: true

  homeassistant:
    discovery: false
    prefix: "homeassistant"

schema:
  mqtt:
    host: str?
    port: port?
    username: str?
    password: str?
    client_id: str?
    keepalive: int?
    clean: bool?
    retain: bool?
    qos: int?
    base_topic: str?
    host_name_as_target: bool?
    ca: str?
    cert: str?
    key: str?
    reject_unauthorized: bool?

  targets_path: str

  use_switch_vision_generated_yaml: bool
  switch_vision_generated_yaml_path: str
  imported_targets_path: str
  backup_existing_config: bool

  homeassistant:
    discovery: bool?
    prefix: str?

  log: list(debug|info|warning|error)?
